name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker image
      - name: Build Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          docker build \
            -f Dockerfile.streamlit \
            -t estateworth-ai:$IMAGE_TAG .

      # Tag Docker image
      - name: Tag Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          ECR_REGISTRY=718118589282.dkr.ecr.ap-south-1.amazonaws.com

          docker tag estateworth-ai:$IMAGE_TAG \
            $ECR_REGISTRY/estateworth-ai:$IMAGE_TAG

          docker tag estateworth-ai:$IMAGE_TAG \
            $ECR_REGISTRY/estateworth-ai:latest

      # Push image to ECR
      - name: Push image to ECR
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          ECR_REGISTRY=718118589282.dkr.ecr.ap-south-1.amazonaws.com

          docker push $ECR_REGISTRY/estateworth-ai:$IMAGE_TAG
          docker push $ECR_REGISTRY/estateworth-ai:latest